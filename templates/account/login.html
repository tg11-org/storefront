{% extends 'base.html' %}
{% load i18n %}
{% block title %}Log In | {{ store_settings.name|default:"TG11 Shop" }}{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Welcome back</p>
  <h1>Log in</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Log in</button>
  </form>
  <p><a href="{% url 'account_signup' %}">Need an account?</a></p>
</section>
{% endblock %}
