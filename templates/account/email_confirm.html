{% extends 'base.html' %}
{% block title %}Confirm Email | TG11 Shop{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Confirm email</p>
  <h1>Finish account setup</h1>
  {% if confirmation %}
    <form method="post">
      {% csrf_token %}
      <button class="button primary" type="submit">Confirm email</button>
    </form>
  {% else %}
    <p>This confirmation link is no longer valid.</p>
  {% endif %}
</section>
{% endblock %}
