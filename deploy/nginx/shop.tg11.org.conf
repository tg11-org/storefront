# Nginx site config for shop.tg11.org
# Install: sudo cp deploy/nginx/shop.tg11.org.conf /etc/nginx/sites-available/shop.tg11.org
#          sudo ln -sf /etc/nginx/sites-available/shop.tg11.org /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream storefront {
    server 127.6.0.10:8000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name shop.tg11.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name shop.tg11.org;

    # --- TLS (adjust paths to your cert provider) ---
    ssl_certificate     /etc/letsencrypt/live/shop.tg11.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.tg11.org/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    # --- User-uploaded media files (served directly by nginx) ---
    # Path matches the Docker Compose volume: ./media:/app/media
    # where ./ is /var/www/storefront on the host.
    location /media/ {
        alias /var/www/storefront/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options nosniff;
        # Prevent directory listing
        autoindex off;
    }

    # --- Collected static files (served directly by nginx) ---
    location /static/ {
        alias /var/www/storefront/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Everything else → gunicorn ---
    location / {
        proxy_pass         http://storefront;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
